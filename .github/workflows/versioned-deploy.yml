name: Deploy Versioned Docs

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to archive (e.g. 1.3.0)'
        required: true
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      # Extract version from tag or manual input
      - name: Extract version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "VERSION=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          fi

      # Fetch existing versioned docs
      - name: Fetch versioned branch
        run: |
          git fetch origin versioned:refs/remotes/origin/versioned || true

      - name: Archive this version
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          mkdir -p /tmp/versioned

          # Checkout existing versioned docs
          if git rev-parse --verify refs/remotes/origin/versioned >/dev/null 2>&1; then
            git --work-tree=/tmp/versioned checkout origin/versioned -- . 2>/dev/null || true
          fi

          # Copy newly built docs into version directory
          cp -r "$GITHUB_WORKSPACE/.vitepress/dist" "/tmp/versioned/v${VERSION}"

          # Rewrite asset paths in archived HTML to point to version's own assets
          # e.g. /myjpa-plus-docs/assets/... -> /myjpa-plus-docs/v1.3.0/assets/...
          find "/tmp/versioned/v${VERSION}" -name "*.html" -exec \
            sed -i "s|/myjpa-plus-docs/assets/|/myjpa-plus-docs/v${VERSION}/assets/|g" {} \;
          find "/tmp/versioned/v${VERSION}" -name "*.html" -exec \
            sed -i "s|/myjpa-plus-docs/vp-icons.css|/myjpa-plus-docs/v${VERSION}/vp-icons.css|g" {} \;

          # Inject "back to latest" banner into all archived HTML files
          # Detect language from URL path and link to correct latest version
          BANNER='<div id="version-banner" style="position:fixed;top:0;left:0;right:0;z-index:9999;background:#f59e0b;color:#000;text-align:center;padding:8px 16px;font-size:14px;font-family:system-ui,sans-serif;">You are viewing an archived version (v'"${VERSION}"'). <a id="latest-link" href="#" style="color:#000;font-weight:600;text-decoration:underline;">View latest version</a></div><style>body{margin-top:40px!important}</style><script>document.getElementById("latest-link").href=location.pathname.includes("/zh/")?"/'"${GITHUB_WORKSPACE##*/}"'/zh/guide/what-is-myjpa-plus.html":"/'"${GITHUB_WORKSPACE##*/}"'/guide/what-is-myjpa-plus.html";</script>'
          find "/tmp/versioned/v${VERSION}" -name "*.html" -exec sed -i "s|<body>|<body>${BANNER}|" {} \;

          # Update versions.json
          cat > /tmp/versioned/versions.json << EOF
          {
            "versions": [
              $(ls -d /tmp/versioned/v*/ 2>/dev/null | sort -V | sed 's|/tmp/versioned/v||;s|/||' | \
                awk '{printf "%s\"%s\"", (NR>1?",":""), $1}')
            ],
            "latest": "${VERSION}"
          }
          EOF

          # Add a redirect index.html for each version directory
          for dir in /tmp/versioned/v*/; do
            ver=$(basename "$dir")
            if [ ! -f "$dir/index.html" ]; then
              cat > "$dir/index.html" << 'HEREDOC'
          <!DOCTYPE html>
          <html>
          <head><meta charset="utf-8"><title>Redirecting...</title>
          <script>window.location.href = window.location.pathname + 'guide/what-is-myjpa-plus.html';</script>
          </head>
          <body>Redirecting...</body>
          </html>
          HEREDOC
            fi
          done

      - name: Push to versioned branch
        run: |
          cd /tmp/versioned
          git init
          git checkout -b versioned
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "docs: archive v${{ steps.version.outputs.VERSION }}"
          git remote add origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          git push origin versioned --force

      # Now deploy with all versions combined
      - name: Include versioned docs in deployment
        run: |
          cd /tmp/versioned
          for dir in v*/; do
            if [ -d "$dir" ]; then
              echo "Including versioned docs: $dir"
              cp -r "$dir" "$GITHUB_WORKSPACE/.vitepress/dist/"
            fi
          done
          if [ -f "versions.json" ]; then
            cp versions.json "$GITHUB_WORKSPACE/.vitepress/dist/"
          fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .vitepress/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
